name: Manual Tests

on:
  workflow_dispatch:

jobs:
  pester:
    name: Run Pester tests
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure Pester is available
        shell: pwsh
        run: |
          $pesterModule = Get-Module Pester -ListAvailable | Sort-Object Version -Descending | Select-Object -First 1

          if (-not $pesterModule -or $pesterModule.Version -lt [version]'5.0.0') {
              Install-Module Pester -Scope CurrentUser -Force -SkipPublisherCheck -MinimumVersion 5.0.0
              $pesterModule = Get-Module Pester -ListAvailable | Sort-Object Version -Descending | Select-Object -First 1
          }

          Write-Host "Using Pester version $($pesterModule.Version)"

      - name: Run PowerShellCliTools tests
        shell: pwsh
        run: |
          Import-Module Pester -MinimumVersion 5.0.0 -Force
          $configuration = New-PesterConfiguration
          $configuration.Run.Path = '.\tests\PowerShellCliTools.Tests.ps1'
          $configuration.Run.Exit = $true
          Invoke-Pester -Configuration $configuration
